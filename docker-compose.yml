version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: matchme-postgres
    environment:
      POSTGRES_DB: matchmedb
      POSTGRES_USER: matchme
      POSTGRES_PASSWORD: matchme123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - matchme-network

volumes:
  postgres_data:

networks:
  matchme-network:
    driver: bridge